<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-labelledby="omni-h-title omni-h-desc">
  <title id="omni-h-title">OmniTrade</title>
  <desc id="omni-h-desc">Horizontal lockup combining the OmniTrade compass mark with the OmniTrade wordmark and a one-line tagline.</desc>

  <defs>
    <linearGradient id="omni-h-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="55%" stop-color="#5C6BE2"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>
    <radialGradient id="omni-h-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF8A3D"/>
    </radialGradient>
    <linearGradient id="omni-h-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F1147"/>
      <stop offset="100%" stop-color="#5A2A8C"/>
    </linearGradient>
  </defs>

  <g transform="translate(20 20) scale(0.625)">
    <circle cx="128" cy="128" r="100" fill="none" stroke="url(#omni-h-ring)" stroke-width="14"/>

    <g stroke="#8A2BE2" stroke-width="7" stroke-linecap="round" fill="none">
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(0 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(32.7273 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(98.1818 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(130.9091 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(163.6364 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(196.3636 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(229.0909 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(261.8182 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(294.5455 128 128)"/>
      <line x1="128" y1="44" x2="128" y2="86" transform="rotate(327.2727 128 128)"/>
    </g>

    <line x1="128" y1="42" x2="128" y2="88" stroke="#FF6B6B" stroke-width="9" stroke-linecap="round" transform="rotate(65.4545 128 128)"/>

    <circle cx="128" cy="128" r="24" fill="#1F1147"/>
    <circle cx="128" cy="128" r="18" fill="url(#omni-h-core)"/>
    <circle cx="128" cy="128" r="6" fill="#1F1147"/>
  </g>

  <text x="200" y="108" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="800" letter-spacing="-1" fill="url(#omni-h-word)">OmniTrade</text>
  <text x="202" y="146" font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="500" letter-spacing="0.5" fill="#5A2A8C" opacity="0.85">LLM-driven crypto futures arena</text>
</svg>
