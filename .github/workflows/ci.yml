name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from the Actions tab — runs the full suite,
  # including Playwright e2e (which needs a live backend in CI).
  workflow_dispatch:

# CI never publishes — no npm publish / twine upload / docker push.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          enable-cache: true
          # uv workspace lives at repo root with `omnitrade` as a member
          # (apps/backend is the package). The lockfile is therefore at
          # the workspace root, not under apps/backend/.
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: mypy --strict
        run: uv run mypy --strict src/

      - name: pytest with coverage ≥ 75%
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          # In-memory SQLite for the whole test run. Some tests build a
          # full FastAPI app via `create_app()` which runs the prod
          # DB-init path before per-test fixtures override the session
          # factory; an in-memory URL keeps that init from failing on
          # the missing `apps/backend/data/` directory in CI.
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
        # Coverage gate is the safety net, not the goal. The post-cutover
        # codebase currently sits at ~78% — we cap at 75 so a tiny drift
        # doesn't turn red, and aim to grow back toward 85+ via
        # follow-up coverage PRs (especially the new T9/T10/T1-T4 paths
        # that came in late and don't yet have full unit coverage).
        run: |
          mkdir -p data
          uv run pytest tests/ -q \
            -m "not manual_qa" \
            --cov=src/omnitrade \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=75

      # Public Codecov upload — no token needed for tokenless OSS uploads.
      # Soft-fail (`fail_ci_if_error: false`) so a Codecov outage doesn't
      # turn the gate red; the in-step `--cov-fail-under=75` is the real
      # threshold.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: apps/backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      # T7 — Agno ReliabilityEval gate. Runs the eval-marked tests in a
      # dedicated step so a failing reliability assertion is visually
      # separated from the main pytest suite in CI logs. The same tests
      # also run as part of the suite above; this step exists to make
      # the signal "decision tool did/didn't fire" loud and unambiguous.
      # Live cassette cases are skipif(no cassette) — see the test
      # docstring for the recording command.
      - name: Agent ReliabilityEval (Agno)
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: uv run pytest tests/eval/ -v -m eval

  frontend:
    name: Frontend (type-check + lint + build + playwright)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/frontend/package.json

      - name: npm ci (workspace install)
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build (next build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # Playwright e2e is gated behind workflow_dispatch — the
      # `dashboard renders streams a decision update` test exercises a
      # live SSE feed which requires the backend + a real cycle to be
      # running. CI doesn't currently boot the backend stack, so on
      # plain `push` we skip these steps. Trigger manually via the
      # Actions tab when you want a full integration run, or run
      # `npm run test:e2e` locally.
      - name: Cache Playwright browsers
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/frontend/package-lock.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (chromium)
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        if: github.event_name == 'workflow_dispatch'
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure() && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          if-no-files-found: ignore

  docker:
    name: Docker compose validity
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Seed .env placeholders (config-only validation)
        run: |
          cp apps/backend/.env.example .env
          cp .env.production.example .env.production

      - name: Validate dev compose
        run: |
          docker compose config >/dev/null
          echo "dev compose: OK"

      - name: Validate prod compose
        run: |
          docker compose -f docker-compose.prod.yml config >/dev/null
          echo "prod compose: OK"

  brand-scrub:
    name: Brand scrub
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: rg zero brand leaks (outside archived history)
        run: |
          set -e
          # `nof1.ai` was deliberately removed from this regex when
          # OmniTrade went open-source: the project is derived from
          # nof1.ai's open-source design (acknowledged in README and
          # source comments), so attribution references are legit, not
          # leaks. The remaining 3 patterns catch obfuscated leaks
          # that should never appear in source.
          if rg -n 'NOFIAIOO|195440|voltagent' \
               --glob '!docs/history/**' \
               --glob '!node_modules/**' \
               --glob '!.omc/**' \
               --glob '!.venv/**' \
               --glob '!docs/RELEASE_CHECKLIST*.md' \
               --glob '!.github/workflows/ci.yml' \
               apps/ docs/ README*.md ; then
            echo "::error::Brand leak detected — must be zero outside docs/history/"
            exit 1
          fi
          echo "brand scrub: CLEAN"
