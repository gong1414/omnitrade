name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI never publishes — no npm publish / twine upload / docker push.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + mypy + pytest + characterization)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/backend/uv.lock"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: mypy --strict
        run: uv run mypy --strict src/

      - name: pytest with coverage ≥ 80%
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          uv run pytest tests/ -q \
            --cov=src/omnitrade \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Characterization gate (≥ 0.95)
        working-directory: ${{ github.workspace }}
        run: |
          uv --project apps/backend run python scripts/run_characterization.py \
            --fixtures tests/fixtures/frozen/ \
            --cassettes apps/backend/tests/behavioral_equivalence/cassettes/ \
            --threshold 0.95 \
            --report apps/backend/tests/behavioral_equivalence/reports/ci.json

      - name: Upload characterization report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: characterization-report
          path: apps/backend/tests/behavioral_equivalence/reports/ci.json
          if-no-files-found: ignore

  frontend:
    name: Frontend (type-check + lint + build + playwright)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/frontend/package.json

      - name: npm ci (workspace install)
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build (next build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/frontend/package-lock.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/frontend/playwright-report
          if-no-files-found: ignore

  docker:
    name: Docker compose validity
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Seed .env placeholders (config-only validation)
        run: |
          cp apps/backend/.env.example .env
          cp .env.production.example .env.production

      - name: Validate dev compose
        run: docker compose config >/dev/null && echo "dev: OK"

      - name: Validate prod compose
        run: docker compose -f docker-compose.prod.yml config >/dev/null && echo "prod: OK"

  brand-scrub:
    name: Brand scrub
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: rg zero brand leaks (outside archived history)
        run: |
          set -e
          if rg -n 'NOFIAIOO|195440|nof1\.ai|voltagent' \
               --glob '!docs/history/**' \
               --glob '!node_modules/**' \
               --glob '!.omc/**' \
               --glob '!.venv/**' \
               apps/ docs/ README*.md ; then
            echo "::error::Brand leak detected — must be zero outside docs/history/"
            exit 1
          fi
          echo "brand scrub: CLEAN"
