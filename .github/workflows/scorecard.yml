# OpenSSF Scorecard — supply-chain security score (0–10) covering
# branch protection, signed commits, pinned actions, vulnerable deps,
# token permissions, and ~15 other checks. Result published to:
#   https://securityscorecards.dev/viewer/?uri=github.com/gong1414/omnitrade
# and surfaced in the Security tab as code-scanning results.

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 5 * * 1" # Monday 05:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-22.04
    permissions:
      security-events: write # to upload SARIF
      id-token: write # to publish results & sign the SBOM
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@ff5dd8929f96a8a4dc67d13f32b8c75057829621 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results=true makes the result appear on
          # securityscorecards.dev for the badge to resolve.
          publish_results: true

      # Upload SARIF so findings show up in the Security tab.
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          sarif_file: results.sarif
