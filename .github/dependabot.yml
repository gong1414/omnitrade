version: 2

# Strategy: only auto-PR minor + patch + security updates. Major-version
# bumps (React 18→19, Next 14→16, Tailwind 3→4, Python 3.11→3.14, …)
# require coordinated migration work and are intentionally pinned.
# When ready to take a major bump, do it manually rather than reading
# off Dependabot. The `ignore: [version-update:semver-major]` block
# below opts out of major bumps everywhere; security advisories still
# come through as patches.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "area: backend"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/apps/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "area: frontend"
    groups:
      js-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "area: ops"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/apps/frontend"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "area: ops"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
